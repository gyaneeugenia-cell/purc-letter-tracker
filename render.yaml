databases:
  - name: purc-db
    plan: free

services:
  - type: web
    name: purc-letter-tracker
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: purc-db
          property: connectionString
