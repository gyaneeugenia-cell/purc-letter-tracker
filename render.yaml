services:
  - type: web
    name: purc-letter-tracker
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      # Set DATABASE_URL manually in the Render dashboard to a free external
      # Postgres (Supabase or Neon) connection string. Leaving it unset runs
      # the app on in-memory data only.
      - key: DATABASE_URL
        sync: false
